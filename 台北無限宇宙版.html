    const nameAdjs = [

    let finalRouteNames = []; // 存儲地標名稱給 Google Maps 導航用

    // 計算兩個經緯度之間的直線距離 (公里)
    function getDistance(lat1, lon1, lat2, lon2) {
        const R = 6371; 
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                  Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                  Math.sin(dLon/2) * Math.sin(dLon/2);
        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        return R * c;
    }

    function generateDynamicRoute() {
        let currentLat = 25.0330; // 大安森林公園起點
        let currentLon = 121.5358;
        let totalDistance = 0;
        let availablePool = [...landmarkPool];
        let selectedPoints = [];
        finalRouteNames = [];

        for(let i = 0; i < 4; i++) {
            // 計算剩餘容許里程 (總長不超過 10km)
            let maxAllowed = Math.min(3, 10.5 - totalDistance); 
            let minAllowed = 1;

            if(maxAllowed < 1) minAllowed = 0.2;

            // 篩選距離在範圍內的地標
            let candidates = availablePool.filter(p => {
                let d = getDistance(currentLat, currentLon, p.lat, p.lon);
                return d >= minAllowed && d <= maxAllowed;
            });

            // 強迫抓最近的點來湊數防當機
            if(candidates.length === 0) {
                availablePool.sort((a, b) => getDistance(currentLat, currentLon, a.lat, a.lon) - getDistance(currentLat, currentLon, b.lat, b.lon));
                candidates = [availablePool[0]];
            }

            let chosen = candidates[Math.floor(Math.random() * candidates.length)];
            let dist = getDistance(currentLat, currentLon, chosen.lat, chosen.lon);
            
            totalDistance += dist;
            selectedPoints.push({
                name: chosen.name,
                dist: dist.toFixed(1)
            });
            finalRouteNames.push(chosen.name);

            currentLat = chosen.lat;
            currentLon = chosen.lon;
            
            availablePool = availablePool.filter(p => p.name !== chosen.name);
        }

        // 產生無厘頭隨機路線名稱與神級早餐
        let randomName = nameAdjs[Math.floor(Math.random() * nameAdjs.length)] + nameNouns[Math.floor(Math.random() * nameNouns.length)];
        let randomBreakfast = breakfasts[Math.floor(Math.random() * breakfasts.length)];

        // 渲染畫面
        let htmlContent = `<h2 style="color: #2f3542; border-bottom: 2px solid #ff6b6b; padding-bottom: 10px;">👑 主題：${randomName}</h2>`;
        htmlContent += `<div class="stats">📈 預估直線總里程：約 ${totalDistance.toFixed(1)} km</div>`;
        
        htmlContent += `
            <div class="point">
                <div class="title">📍 起點：大安森林公園</div>
                <div class="desc">都市綠洲，伸展暖身，確認跑鞋包覆性！</div>
            </div>`;
            
        selectedPoints.forEach((p, index) => {
            htmlContent += `
                <div class="point">
                    <div class="title">📸 Check Point ${index + 1}：${p.name}</div>
                    <div class="desc">距上一站直線距離約 ${p.dist} km。</div>
                </div>
            `;
        });
        
        htmlContent += `<div class="point breakfast">🍳 終點隨機獎勵：<br><span style="color: #fff; font-size: 1.2em;">${randomBreakfast}</span></div>`;
        
        const displayDiv = document.getElementById('routeDisplay');
        const googleBtn = document.getElementById('googleBtn');
        
        displayDiv.style.display = 'none';
        googleBtn.style.display = 'none';
        
        setTimeout(() => {
            displayDiv.innerHTML = htmlContent;
            displayDiv.style.display = 'block';
            googleBtn.style.display = 'block';
        }, 50);
    }

    function openGoogleMaps() {
        if (finalRouteNames.length === 0) return;
        
        const origin = encodeURIComponent("大安森林公園");
        const destination = encodeURIComponent(finalRouteNames[finalRouteNames.length - 1]);
        
        let waypointsArr = [];
        for(let i = 0; i < finalRouteNames.length - 1; i++) {
            waypointsArr.push(encodeURIComponent(finalRouteNames[i]));
        }
        const waypoints = waypointsArr.join('|');

        const url = `https://www.google.com/maps/dir/?api=1&origin=${origin}&destination=${destination}&waypoints=${waypoints}&travelmode=walking`;
        window.open(url, '_blank');
    }
